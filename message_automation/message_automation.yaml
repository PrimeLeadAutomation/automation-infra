AWSTemplateFormatVersion: '2010-09-09'
Description: Camada de Mensageria

Resources:

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: arq-infra-alerts

  AlertTopicEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: seu-email@exemplo.com  # Substitua pelo e-mail desejado

Outputs:
  TopicArn:
    Value: !Ref AlertTopic