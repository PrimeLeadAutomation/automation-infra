  TransformToGoldPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TransformToGoldFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: arn:aws:s3:::primelead-bkt-prata

Outputs:
  BronzeBucketName:
    Value: !Ref BronzeBucket

  SilverBucketName:
    Value: !Ref SilverBucket

  GoldBucketName:
    Value: !Ref GoldBucket

  TransformToSilverArn:
    Description: ARN da função Lambda transform-to-silver para cross-stack
    Value: !GetAtt TransformToSilverFunction.Arn
    Export:
      Name: pilha-armazenamento-transform-to-silver-arn

  TransformToGoldArn:
    Description: ARN da função Lambda transform-to-gold para cross-stack
    Value: !GetAtt TransformToGoldFunction.Arn
    Export:
      Name: pilha-armazenamento-transform-to-gold-arn