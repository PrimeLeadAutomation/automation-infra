AWSTemplateFormatVersion: '2010-09-09'
Description: Camada de Computação

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  Ec2InstanceProfileName:
    Type: String
    Default: LabInstanceProfile
    Description: Nome do instance profile já existente.

Resources:

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acesso SSH, HTTP e Grafana
      VpcId: !ImportValue VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  PublicInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      KeyName: !Ref KeyName
      SubnetId: !ImportValue PublicSubnetId
      IamInstanceProfile: !Ref Ec2InstanceProfileName
      SecurityGroupIds:
        - !Ref SecurityGroup
      ImageId: !Ref LatestAmiId
      Tags:
        - Key: Name
          Value: arq-infra-ec2-public
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/userdata-grafana.log) 2>&1
          dnf update -y
          dnf install -y docker
          systemctl enable --now docker
          usermod -aG docker ec2-user || true
          docker run -d --name grafana --restart unless-stopped -p 3000:3000 grafana/grafana

  GrafanaElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: arq-infra-eip-grafana

  GrafanaEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt GrafanaElasticIP.AllocationId
      InstanceId: !Ref PublicInstance

  PrivateInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      KeyName: !Ref KeyName
      SubnetId: !ImportValue PrivateSubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      ImageId: !Ref LatestAmiId
      Tags:
        - Key: Name
          Value: arq-infra-ec2-private

  TransformToSilverFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: transform-to-silver
      Handler: index.handler
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Runtime: python3.12
      Timeout: 60
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              print("Evento recebido:", json.dumps(event))
              # TODO: lógica de transformação Bronze -> Silver
              return {"statusCode": 200}


  TransformToSilverPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TransformToSilverFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::arq-infra-bronze-${AWS::AccountId}


  TransformToGoldFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: transform-to-gold
      Handler: index.handler
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Runtime: python3.12
      Timeout: 60
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              print("Evento recebido:", json.dumps(event))
              # TODO: lógica de transformação Silver -> Gold
              return {"statusCode": 200}


  TransformToGoldPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TransformToGoldFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::arq-infra-silver-${AWS::AccountId}


Outputs:
  PublicInstanceId:
    Value: !Ref PublicInstance

  GrafanaPublicIp:
    Description: IP público fixo (Elastic IP) — Grafana em http://<IP>:3000
    Value: !Ref GrafanaElasticIP

  PrivateInstanceId:
    Value: !Ref PrivateInstance

  TransformToSilverArn:
    Description: ARN da função Lambda transform-to-silver para cross-stack
    Value: !GetAtt TransformToSilverFunction.Arn
    Export:
      Name: pilha-computacao-transform-to-silver-arn

  TransformToGoldArn:
    Description: ARN da função Lambda transform-to-gold para cross-stack
    Value: !GetAtt TransformToGoldFunction.Arn
    Export:
      Name: pilha-computacao-transform-to-gold-arn