AWSTemplateFormatVersion: '2010-09-09'
Description: Camada de Computação

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
  # AMI Ubuntu 24.04 LTS da região (Canonical via SSM — amd64, hvm, gp3).
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
  # Ambientes de lab exigem um instance profile pré-existente (LabRole).
  Ec2InstanceProfileName:
    Type: String
    Default: LabInstanceProfile
    Description: Nome do instance profile já existente.

Resources:

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acesso SSH, HTTP e Grafana
      VpcId: !ImportValue VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  PublicInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      KeyName: !Ref KeyName
      SubnetId: !ImportValue PublicSubnetId
      IamInstanceProfile: !Ref Ec2InstanceProfileName
      SecurityGroupIds:
        - !Ref SecurityGroup
      ImageId: !Ref LatestAmiId
      Tags:
        - Key: Name
          Value: arq-infra-ec2-public
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/userdata-grafana.log) 2>&1
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y
          apt-get install -y docker.io
          systemctl enable --now docker
          usermod -aG docker ubuntu || true
          docker run -d --name grafana --restart unless-stopped -p 3000:3000 grafana/grafana:12.4.3

  GrafanaElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: arq-infra-eip-grafana

  GrafanaEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt GrafanaElasticIP.AllocationId
      InstanceId: !Ref PublicInstance

  PrivateInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      KeyName: !Ref KeyName
      SubnetId: !ImportValue PrivateSubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      ImageId: !Ref LatestAmiId
      Tags:
        - Key: Name
          Value: arq-infra-ec2-private


Outputs:
  PublicInstanceId:
    Value: !Ref PublicInstance

  GrafanaPublicIp:
    Description: IP público fixo (Elastic IP) — Grafana em http://<IP>:3000
    Value: !Ref GrafanaElasticIP

  PrivateInstanceId:
    Value: !Ref PrivateInstance